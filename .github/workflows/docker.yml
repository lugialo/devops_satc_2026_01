name: Docker Image Check

on:
    push:
        branches: ["develop"]
    workflow_dispatch:

jobs:
    docker-check:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  # Replace 'your-dockerhub-username/app-name' with your actual image name
                  tags: ${{ secrets.DOCKER_USERNAME }}/devops-satc:latest
                  cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops-satc:buildcache
                  cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops-satc:buildcache,mode=max
